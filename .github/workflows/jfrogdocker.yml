name: jfrog-docker-build-upload

on:
  workflow_dispatch:
    inputs:
      id:
        description: "Run identifier (image tag); defaults to commit SHA if empty"
        required: false
        type: string
      repo_name:
        description: "Repo name (e.g. for sha-docker-repo / RT paths)"
        required: true
        type: string
      runner:
        description: "Runner for follow-up job"
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - self-hosted

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
      artifact-metadata: write

    env:
      SUBJECT_NAME: productdemo.jfrog.io/github-artifact-view/test
      IMAGE_TAG: ${{ github.event.inputs.id != '' && github.event.inputs.id || github.sha }}

    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      digest: ${{ steps.meta.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: 2.92.0
          custom-server-id: productdemo
          disable-auto-evidence-collection: true
        env:
          JF_URL: ${{ secrets.JFROG_PLATFORM_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JFROG_ACCESS_TOKEN }}

      - name: Build image (JFrog CLI)
        run: |
          jf docker build \
            --server-id=productdemo \
            -f docker/docker.Dockerfile \
            -t "${{ env.SUBJECT_NAME }}:${{ env.IMAGE_TAG }}" \
            docker

      - name: Push image (JFrog CLI)
        id: push
        run: |
          jf docker push "${{ env.SUBJECT_NAME }}:${{ env.IMAGE_TAG }}" --server-id=productdemo

      - name: Resolve digest for attestation
        id: meta
        env:
          IMG: ${{ env.SUBJECT_NAME }}:${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          DIGEST="$(docker buildx imagetools inspect "$IMG" --format '{{.Manifest.Digest}}')"
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "<no value>" ]; then
            DIGEST="$(docker buildx imagetools inspect "$IMG" --format '{{.Digest}}')"
          fi
          case "$DIGEST" in sha256:*) ;; *)
            echo "Could not resolve digest for $IMG (got: '$DIGEST')" >&2
            exit 1
            ;;
          esac
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ env.SUBJECT_NAME }}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance (GitHub)
        if: steps.meta.outputs.digest != ''
        uses: actions/attest-build-provenance@v3.2.0
        with:
          subject-name: ${{ env.SUBJECT_NAME }}
          subject-digest: ${{ steps.meta.outputs.digest }}
          push-to-registry: false

  jfrog:
    needs: build
    runs-on: ${{ github.event.inputs.runner }}
    permissions:
      contents: read

    env:
      JF_URL: ${{ github.event.inputs.runner == 'self-hosted' && secrets.JFROG_TEST_URL || secrets.JFROG_PLATFORM_URL }}
      JF_ACCESS_TOKEN: ${{ github.event.inputs.runner == 'self-hosted' && secrets.JFROG_TEST_TOKEN || secrets.JFROG_ACCESS_TOKEN }}

    steps:
      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: 2.92.0
          custom-server-id: productdemo
          disable-auto-evidence-collection: true
        env:
          JF_URL: ${{ env.JF_URL }}
          JF_ACCESS_TOKEN: ${{ env.JF_ACCESS_TOKEN }}

      - name: Log in Docker to Artifactory
        run: jf docker login productdemo.jfrog.io --server-id=productdemo

      - name: Pull published image
        run: docker pull "${{ needs.build.outputs.image_ref }}"

      - name: Use repo_name (replace with real jf rt steps)
        run: |
          echo "repo_name=${{ github.event.inputs.repo_name }}"
          echo "image_ref=${{ needs.build.outputs.image_ref }}"
          echo "digest=${{ needs.build.outputs.digest }}"
