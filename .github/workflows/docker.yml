name: docker-build-upload

on:
  workflow_dispatch:
    inputs:
      id:
        description: "run identifier"
        required: false
      repo_name:
        description: "Repo name (used in sha-docker-repo path)"
        required: true  
      runner:
        description: "Run on"
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - self-hosted

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
      artifact-metadata: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    outputs:
      image_ref: ${{ steps.vars.outputs.image_ref }}
      digest: ${{ steps.vars.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5.0.0
        with:
          context: docker
          file: docker/docker.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Attest
        if: steps.push.outputs.digest != ''
        uses: actions/attest-build-provenance@v3.2.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Set job outputs for JFrog
        id: vars
        run: |
          echo "digest=${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"

  jfrog:
    runs-on: ${{ github.event.inputs.runner }}
    needs: build
    permissions:
      contents: read
    env:
      JF_URL: ${{ github.event.inputs.runner == 'self-hosted' && secrets.JFROG_TEST_URL || secrets.JFROG_PLATFORM_URL }}
      JF_ACCESS_TOKEN: ${{ github.event.inputs.runner == 'self-hosted' && secrets.JFROG_TEST_TOKEN || secrets.JFROG_ACCESS_TOKEN }}

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN_GIT }}

      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: 2.92.0
          custom-server-id: productdemo
        env:
          JF_URL:  ${{ secrets.JFROG_PLATFORM_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JFROG_ACCESS_TOKEN }}
          # JF_URL:  ${{ secrets.JFROG_TEST_URL }}
          # JF_ACCESS_TOKEN: ${{ secrets.JFROG_TEST_TOKEN }}

      # - name: Push to JFrog
